<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ocean/Sky background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#92FE9D" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#799F0C" />
    </linearGradient>
    <!-- Sand gradient -->
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#FF9900" />
    </linearGradient>
    <!-- Palm leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" stroke="#ffffff" stroke-width="8" filter="drop-shadow(0 12px 24px rgba(0,0,0,0.15))" />
  
  <!-- Palm Trees -->
  <!-- Left Palm -->
  <g transform="translate(110, 240) scale(0.65)">
    <path d="M 0,160 Q -30,60 -10,-40" fill="none" stroke="#795548" stroke-width="16" stroke-linecap="round" />
    <!-- Leaves -->
    <path d="M -10,-40 Q -80,-50 -120,0 Q -80,20 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q -70,-100 -100,-80 Q -50,-60 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 0,-120 30,-90 Q 20,-50 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 60,-90 90,-50 Q 40,-30 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 80,-20 110,30 Q 60,30 -10,-40" fill="url(#leafGrad)" />
  </g>
  
  <!-- Right Palm -->
  <g transform="translate(400, 240) scale(0.65) scale(-1, 1)">
    <path d="M 0,160 Q -30,60 -10,-40" fill="none" stroke="#795548" stroke-width="16" stroke-linecap="round" />
    <!-- Leaves -->
    <path d="M -10,-40 Q -80,-50 -120,0 Q -80,20 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q -70,-100 -100,-80 Q -50,-60 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 0,-120 30,-90 Q 20,-50 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 60,-90 90,-50 Q 40,-30 -10,-40" fill="url(#leafGrad)" />
    <path d="M -10,-40 Q 80,-20 110,30 Q 60,30 -10,-40" fill="url(#leafGrad)" />
  </g>

  <!-- Sand Hill / Sandy bottom -->
  <path d="M 16,420 Q 256,380 496,420 L 496,496 L 16,496 Z" fill="url(#sandGrad)" />

  <!-- Beach Ball -->
  <g transform="translate(150, 410) scale(0.5)">
    <circle cx="0" cy="0" r="50" fill="#ffffff" stroke="#000000" stroke-width="3" />
    <path d="M -50,0 A 50,50 0 0,1 50,0 Z" fill="#ff3366" stroke="#000000" stroke-width="3" />
    <path d="M 0,-50 A 50,50 0 0,1 0,50 Z" fill="#3399ff" stroke="#000000" stroke-width="3" />
    <circle cx="0" cy="0" r="15" fill="#ffcc00" stroke="#000000" stroke-width="3" />
  </g>

  <!-- Starfish -->
  <path d="M 380,410 L 390,430 L 412,432 L 395,446 L 400,468 L 380,455 L 360,468 L 365,446 L 348,432 L 370,430 Z" fill="#FF5722" stroke="#ffffff" stroke-width="2" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))" />

  <!-- 3D Style Text: CENTRAL PKXD -->
  <g filter="drop-shadow(0 8px 12px rgba(0,0,0,0.35))">
    <!-- Back/Border Layer for 3D depth -->
    <text x="256" y="300" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="52" fill="#1A237E" text-anchor="middle" letter-spacing="2">CENTRAL</text>
    <text x="256" y="365" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="78" fill="#1A237E" text-anchor="middle" letter-spacing="4">PKXD</text>
    
    <!-- Deep Blue Mid Shadow -->
    <text x="256" y="296" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="52" fill="#2979FF" text-anchor="middle" letter-spacing="2">CENTRAL</text>
    <text x="256" y="361" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="78" fill="#2979FF" text-anchor="middle" letter-spacing="4">PKXD</text>
    
    <!-- Yellow/Orange Top Layer -->
    <text x="256" y="292" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="52" fill="#FFEB3B" text-anchor="middle" letter-spacing="2">CENTRAL</text>
    <text x="256" y="357" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="78" fill="#FFEB3B" text-anchor="middle" letter-spacing="4">PKXD</text>
  </g>
</svg>
