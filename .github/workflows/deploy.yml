name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm install

      - name: Build 🏗️
        run: npm run build
        env:
          SQL_HOST: dummy_host
          SQL_DB_NAME: dummy_db
          SQL_ADMIN_USER: dummy_user
          SQL_ADMIN_PASSWORD: dummy_password

      - name: Deploy to GH Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
